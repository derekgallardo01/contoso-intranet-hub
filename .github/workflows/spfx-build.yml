name: Build and Test SPFx

on:
  push:
    branches: [main, master]
    paths:
      - "spfx/**"
  pull_request:
    branches: [main, master]
    paths:
      - "spfx/**"
  workflow_dispatch:

env:
  SPFX_PATH: spfx/contoso-intranet-spfx
  NODE_VERSION: "22.x"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.SPFX_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ${{ env.SPFX_PATH }}

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
        working-directory: ${{ env.SPFX_PATH }}

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ${{ env.SPFX_PATH }}

      - name: Run unit tests
        run: npm test -- --ci --coverage
        working-directory: ${{ env.SPFX_PATH }}

      - name: Build solution
        run: npx gulp bundle --ship
        working-directory: ${{ env.SPFX_PATH }}

      - name: Package solution
        run: npx gulp package-solution --ship
        working-directory: ${{ env.SPFX_PATH }}

      - name: Upload .sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: ${{ env.SPFX_PATH }}/sharepoint/solution/*.sppkg

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ env.SPFX_PATH }}/coverage/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .sppkg artifact
        uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: ./package

      - name: Deploy to App Catalog
        run: |
          echo "To deploy, configure this step with PnP CLI or PnP PowerShell:"
          echo "  npx @pnp/cli-microsoft365 spo app add --filePath ./package/*.sppkg --appCatalogUrl \$APP_CATALOG_URL --overwrite"
          echo "  npx @pnp/cli-microsoft365 spo app deploy --name contoso-intranet-spfx.sppkg --appCatalogUrl \$APP_CATALOG_URL"
          echo ""
          echo "Artifact downloaded to ./package/"
          ls -la ./package/
