name: Build and Test SPFx

on:
  push:
    branches: [main, master]
    paths:
      - "spfx/**"
  pull_request:
    branches: [main, master]
    paths:
      - "spfx/**"
  workflow_dispatch:

env:
  SPFX_PATH: spfx/contoso-intranet-spfx
  NODE_VERSION: "22.x"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.SPFX_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.SPFX_PATH }}

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ${{ env.SPFX_PATH }}

      - name: Run unit tests
        run: npm test -- --ci --coverage
        working-directory: ${{ env.SPFX_PATH }}

      - name: Build solution
        run: npx gulp bundle --ship
        working-directory: ${{ env.SPFX_PATH }}

      - name: Package solution
        run: npx gulp package-solution --ship
        working-directory: ${{ env.SPFX_PATH }}

      - name: Upload .sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: ${{ env.SPFX_PATH }}/sharepoint/solution/*.sppkg

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ env.SPFX_PATH }}/coverage/
